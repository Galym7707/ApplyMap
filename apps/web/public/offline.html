<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>You're offline — ApplyMap</title>
    <style>
      :root {
        color-scheme: light;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI",
          Roboto, "Helvetica Neue", Arial, sans-serif;
      }
      body {
        margin: 0;
        min-height: 100vh;
        background: #f9f8f6;
        color: #0f172a;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      main {
        max-width: 420px;
        text-align: center;
      }
      h1 {
        font-size: 24px;
        margin: 0 0 12px;
        color: #21278f;
      }
      p {
        margin: 0 0 12px;
        line-height: 1.5;
        color: #334155;
      }
      a {
        color: #21278f;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>You're offline</h1>
      <p>
        ApplyMap couldn't reach the network. Cached pages, your saved profile,
        and the university list are still available — just go back or open the
        app from the home screen.
      </p>
      <p>
        <a href="/">Retry</a>
      </p>
    </main>
  </body>
</html>
