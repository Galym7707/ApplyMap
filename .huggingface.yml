# ApplyMap: AI-Powered Educational Navigation

**Democratizing access to quality university counseling for underserved communities.**

## 🌍 Problem

- **3.8M** high school students in Kazakhstan
- **1.56M** in rural areas without counseling access
- **$2,000-5,000** average cost of private counselors (unaffordable for 85%)
- **90,333** students study abroad, mostly without systematic guidance

## 💡 Solution

ApplyMap provides free AI-powered counseling that:
- Analyzes student achievements in 5 minutes
- Recommends suitable universities with funding opportunities
- Optimizes applications for Common App and international systems
- Works offline for rural areas with weak internet
- Supports Kazakh, Russian, and English

## 🚀 Features

- **Achievement Vault**: Import and analyze activities/honors from documents
- **AI Scoring**: 4-dimensional analysis (relevance, selectivity, continuity, distinctiveness)
- **University Matching**: 200+ universities with funding information
- **Application Optimizer**: Generates optimized text within character limits
- **Multilingual**: Kazakh, Russian, English support
- **Offline Mode**: PWA for areas with limited connectivity

## 📊 Impact

**Target:** 10,000+ students by end of 2026

**Expected Outcomes:**
- 30% increase in scholarship applications
- 50% reduction in unsuitable applications
- $5M saved on counseling fees

## 🛠️ Tech Stack

- **Backend**: FastAPI + PostgreSQL + SQLAlchemy
- **Frontend**: Next.js 14 + TypeScript + Tailwind CSS
- **AI**: Google Gemini 2.0 Flash
- **Document Processing**: pdfplumber + python-docx

